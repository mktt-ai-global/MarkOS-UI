name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify project
        run: npm run check

      - name: Package source release
        run: ./scripts/package-release.sh HEAD "${GITHUB_REF_NAME}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: MarkOS UI ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            release/MarkOS-UI-${{ github.ref_name }}-source.tar.gz
            release/MarkOS-UI-${{ github.ref_name }}-source.zip
            release/MarkOS-UI-${{ github.ref_name }}-SHA256SUMS.txt
